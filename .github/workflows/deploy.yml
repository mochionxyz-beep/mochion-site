name: Deploy to Cloudflare Pages

# Every push to main (site edits, or the box's daily data push) rebuilds the two
# deploy-time artifacts and redeploys the "mochion" Pages project:
#   og/tape.png — the live OG share card, rendered from data/public.json
#   feed.xml    — the Atom feed, parsed from log.html
# The site itself stays static, no-build, no client-side framework.
on:
  push:
    branches: [main]

# never run two deploys at once; a newer push supersedes an in-flight one
concurrency:
  group: pages-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install CI generators (pinned)
        run: npm ci --prefix ci --no-audit --no-fund

      # live OG card — NON-FATAL: a card bug must never block the daily record.
      # Falls back to the static index card so og:image always resolves.
      - name: Render live OG card
        run: |
          node ci/og-tape.mjs || { mkdir -p og; cp assets/og/og-index.jpg og/tape.png; echo "og card render failed - shipped static fallback"; }

      # Atom feed — FATAL: only hand edits to log.html can break it, and that's
      # exactly the push that should go red.
      - name: Build Atom feed
        run: node ci/build-feed.mjs

      # unfurl caches key on the exact og:image URL, and the CDN edge caches
      # css/js for hours — a fresh ?v= per deploy makes both pick up changes
      # immediately. Deployed HTML differs from the committed HTML by these
      # substitutions only (disclosed in the README).
      - name: Cache-bust the live card + css/js
        run: |
          STAMP=$(date -u +%Y%m%d%H%M)
          sed -i "s|og/tape.png?v=[^\"]*|og/tape.png?v=$STAMP|" index.html
          sed -i -E "s|(css/styles\.css\?v=)[^\"]*|\1$STAMP|g; s|(js/tape\.js\?v=)[^\"]*|\1$STAMP|g; s|(js/activity\.js\?v=)[^\"]*|\1$STAMP|g" index.html log.html roadmap.html 404.html

      # generators are done — don't upload their dependencies to Pages
      - name: Drop CI node_modules from the deploy dir
        run: rm -rf ci/node_modules

      - name: Deploy to Cloudflare Pages
        run: npx wrangler@latest pages deploy . --project-name=mochion --branch=main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      # third-party timestamp: every daily record lands in the Internet Archive.
      # Best-effort — the archive being slow must not fail the deploy.
      - name: Snapshot to the Wayback Machine
        run: curl -s -m 60 "https://web.archive.org/save/https://mochion.xyz/" -o /dev/null || true
