name: Deploy to Cloudflare Pages

# Every push to main (site edits, or the box's hourly data pushes) redeploys the
# existing "mochion" Pages project — so mochion.xyz stays a static, no-build site.
on:
  push:
    branches: [main]

# never run two deploys at once; a newer push supersedes an in-flight one
concurrency:
  group: pages-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Cloudflare Pages
        run: npx wrangler@latest pages deploy . --project-name=mochion --branch=main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
