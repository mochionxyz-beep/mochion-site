name: Monthly retro

on:
  schedule:
    - cron: '5 16 1 * *'      # 1st of the month, 16:05 UTC
  workflow_dispatch:
    inputs:
      dry_run:
        description: log what would post, without posting
        default: 'true'

concurrency:
  group: monthly
  cancel-in-progress: false

jobs:
  monthly:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install CI generators (pinned)
        run: npm ci --prefix ci --no-audit --no-fund
      - name: Post the monthly retro        # renders its own card after the guards pass
        run: node ci/post-monthly.mjs
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_SECRET: ${{ secrets.X_ACCESS_SECRET }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DRY_RUN: ${{ inputs.dry_run || 'false' }}
