<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" role="img" aria-label="The Tape — telemetry panel, under construction">
  <defs>
    <pattern id="ht" width="8" height="8" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#20180F" opacity="0.10"/>
    </pattern>
  </defs>
  <rect width="800" height="380" fill="#F4ECD8"/>
  <rect width="800" height="380" fill="url(#ht)"/>

  <!-- typewriter caption bar -->
  <rect x="0" y="0" width="800" height="44" fill="#E7DCC2"/>
  <line x1="0" y1="44" x2="800" y2="44" stroke="#20180F" stroke-width="2.5"/>
  <text x="20" y="28" font-family="'Courier New', monospace" font-size="15" letter-spacing="1.5" fill="#20180F">LIVE TELEMETRY &#183; UPDATED HOURLY ONCE THE PIPELINE SHIPS</text>

  <!-- ticker tape -->
  <path d="M60,232 L740,232" stroke="#20180F" stroke-width="3" stroke-dasharray="3 12" stroke-linecap="round" opacity="0.6"/>
  <text x="400" y="150" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-weight="bold" font-size="40" fill="#20180F">THE TAPE PRINTS HERE</text>
  <text x="400" y="188" text-anchor="middle" font-family="'Courier New', monospace" font-size="17" letter-spacing="2" fill="#8E2C22">&#8212; UNDER CONSTRUCTION &#8212;</text>

  <!-- the three mochi, sitting on the tape -->
  <g transform="translate(370,214)">
    <circle cx="0" cy="0" r="16" fill="#EFA9B8" stroke="#20180F" stroke-width="3"/>
    <circle cx="30" cy="0" r="16" fill="#F6F1E7" stroke="#20180F" stroke-width="3"/>
    <circle cx="60" cy="0" r="16" fill="#9DBB72" stroke="#20180F" stroke-width="3"/>
  </g>

  <text x="400" y="300" text-anchor="middle" font-family="'Courier New', monospace" font-size="14" letter-spacing="1" fill="#6E6046">once live: equity curve &#183; drawdown &#183; uptime &#183; days live</text>
  <text x="780" y="360" text-anchor="end" font-family="'Courier New', monospace" font-size="12.5" fill="#6E6046">live since &#8212;&#8212; &#183; 0 days</text>
</svg>
